patch:
  switches/@0/reset: 0

  engine/processors/@last: express_editor
  engine/filters/@next: reverse_lookup_filter@self_reverse_lookup

  speller/algebra/@before 0: 'xform|#.*$||'

  self_reverse_lookup:
    dictionary: iridium_bpmf_ext
    comment_format:
      - 'xform|^[^#]+||'
      - 'xform|#||'

  punctuator:
    full_shape:
      ' ': { commit: 'гАА' }
      '<': 'пЉМ'
      '>': 'гАВ'
      '?': 'пЉЯ'
      ':': 'пЉЪ'
      "'": 'гАБ'
      '"': 'пЉЫ'
      '\': [ 'пЉП', 'пЉЉ' ]
      '|': [ 'пљЬ', '¬ґ', '¬І' ]
      '~': 'пљЮ'
      '!': 'пЉБ'
      '@': [ 'пЉ†', 'вШѓ' ]
      '#': [ 'пЉГ', 'вМШ' ]
      '%': [ 'пЉЕ', '¬∞', 'вДГ' ]
      '$': [ 'пЉД', 'пњ•', 'вВђ', '¬£', '¬•', '¬Ґ', '¬§' ]
      '^': 'вА¶вА¶'
      '&': 'пЉЖ'
      '*': [ 'пЉК', 'гГї', '√Ч', 'вАї', 'вЭВ' ]
      '(': 'пЉИ'
      ')': 'пЉЙ'
      '_': [ 'вАФ', 'вАФвАФ' ]
      '+': 'пЉЛ'
      '=': 'пЉЭ'
      '[': [ 'гАМ', 'гАК', 'гАР', 'гАФ', 'пЉї' ]
      ']': [ 'гАН', 'гАЛ', 'гАС', 'гАХ', 'пЉљ' ]
      '{': [ 'гАО', 'гАИ', 'гАЦ', 'пљЫ' ]
      '}': [ 'гАП', 'гАЙ', 'гАЧ', 'пљЭ' ]
    half_shape:
      '<': 'пЉМ'
      '>': 'гАВ'
      '?': 'пЉЯ'
      ':': 'пЉЪ'
      "'": 'гАБ'
      '"': 'пЉЫ'
      '\': [ '/', 'пЉП', '\', 'пЉЉ' ]
      '|': [ '|', 'пљЬ', '¬ґ', '¬І' ]
      '`': { commit: '`' }
      '~': [ '~', 'пљЮ' ]
      '!': 'пЉБ'
      '@': { commit: '@' }
      '#': { commit: '#' }
      '%': [ '%', 'пЉЕ', '¬∞', 'вДГ' ]
      '$': [ '$', '¬•', 'вВђ', '¬£', '¬Ґ', '¬§' ]
      '^': [ '^', 'вА¶', 'вА¶вА¶' ]
      '&': '&'
      '*': [ '*', 'пЉК', 'гГї', '√Ч', 'вАї', 'вЭВ' ]
      '(': [ '(', 'пЉИ' ]
      ')': [ ')', 'пЉЙ' ]
      '_': [ '_', 'вАФ', 'вАФвАФ' ]
      '+': '+'
      '=': '='
      '[': [ 'гАМ', 'гАК', 'гАР', 'гАФ', 'пЉї' ]
      ']': [ 'гАН', 'гАЛ', 'гАС', 'гАХ', 'пЉљ' ]
      '{': [ 'гАО','гАИ', 'гАЦ', 'пљЫ' ]
      '}': [ 'гАП','гАЙ', 'гАЧ', 'пљЭ' ]
    symbols:
      '`': [ '`' ]

  # Override `[` and `]` behaviors.
  key_binder:
    bindings:
      - { when: has_menu, accept: comma,  send: comma }   # гДЭ
      - { when: has_menu, accept: period, send: period }  # гД°
      - { when: has_menu, accept: minus,  send: minus }   # гД¶

      - { when: has_menu, accept: Shift+BackSpace, send: BackSpace }
      - { when: has_menu, accept: BackSpace,       send: Control+BackSpace }

      - { when: has_menu, accept: Left,  send: Page_Up }
      - { when: has_menu, accept: Right, send: Page_Down }
